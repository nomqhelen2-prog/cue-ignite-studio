<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact — OnCue Marketing</title>
<meta name="description" content="Let's work together. Reach OnCue Marketing in Johannesburg, Cape Town and Durban.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&display=swap">
<link rel="stylesheet" href="/styles.css">
<script src="/partials.js"></script>
</head>
<body>
<main>
  <section>
    <div class="container">
      <p class="eyebrow">Company Profile / 2026</p>
      <h1 class="display">Let's<br>Work<br><span class="gold">Together</span></h1>
    </div>
  </section>
  <section>
    <div class="container grid grid-12">
      <div class="col-5">
        <div class="channels">
          <a class="channel" href="https://wa.me/27601064358" target="_blank" rel="noopener">
            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 0 1-12.8 7.1L3 21l2.4-5.2A8.38 8.38 0 1 1 21 11.5z"/></svg>
            <div><div class="l">WhatsApp</div><div class="v">+27 60 106 4358</div></div>
          </a>
          <a class="channel" href="mailto:admin@oncuemarketing.info">
            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
            <div><div class="l">Email</div><div class="v">admin@oncuemarketing.info</div></div>
          </a>
          <a class="channel" href="https://instagram.com/oncuemarketing" target="_blank" rel="noopener">
            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>
            <div><div class="l">Instagram</div><div class="v">@oncuemarketing</div></div>
          </a>
          <div class="channel">
            <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s7-7.58 7-13a7 7 0 0 0-14 0c0 5.42 7 13 7 13z"/><circle cx="12" cy="9" r="2.5"/></svg>
            <div><div class="l">Reach</div><div class="v">JHB | CPT | DBN</div></div>
          </div>
        </div>
      </div>
      <form id="contact-form" class="col-7 bordered form" novalidate>
        <h2 style="font-size:32px">Send us a brief</h2>
        <div class="field"><label>Name</label><input name="name" required maxlength="120" placeholder="Your full name"></div>
        <div class="field"><label>Email</label><input name="email" type="email" required maxlength="255" placeholder="you@brand.com"></div>
        <div class="field"><label>Message</label><textarea name="message" rows="5" required maxlength="2000" placeholder="Tell us about your brand and activation goals"></textarea></div>
        <div id="form-msg" class="form-msg"></div>
        <button type="submit" class="submit">Submit Enquiry</button>
      </form>
    </div>
  </section>
</main>
<script src="/main.js"></script>
</body>
</html>
